<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<link rel="icon" type="image/x-icon" href="../img/icon.jpg"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Intemporal | Detalles de la Pieza</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../assets/js/tailwind-config.js"></script>
<link href="../assets/css/base.css" rel="stylesheet"/>
</head>
<body class="bg-surface selection:bg-primary-fixed selection:text-primary">
<header class="fixed top-0 w-full z-50 rounded-none bg-[#fbf9f4]/70 backdrop-blur-xl dark:bg-[#18241a]/80 shadow-none">
<nav class="flex flex-col md:flex-row justify-between md:items-center w-full px-4 sm:px-6 md:px-12 py-4 md:py-6 max-w-[1920px] mx-auto gap-3 md:gap-0">
<div class="flex items-center justify-between w-full md:w-auto gap-8">
<a class="font-noto-serif text-2xl tracking-[0.2em] uppercase text-[#18241a] dark:text-[#fbf9f4]" href="index.html">INTEMPORAL</a>
<div class="hidden md:flex items-center gap-8 font-manrope text-lg tracking-tight">
<a class="text-[#705a49] dark:text-[#705a49] opacity-70 hover:opacity-100 hover:text-[#18241a] transition-all duration-300" href="index.html">Inicio</a>
<a class="text-[#18241a] dark:text-[#fbf9f4] border-b border-[#18241a] pb-1" href="catalogo.html">Catálogo</a>
<a class="text-[#705a49] dark:text-[#705a49] opacity-70 hover:opacity-100 hover:text-[#18241a] transition-all duration-300" href="asesoria.html">Asesoría</a>
</div>
</div>
</nav>
</header>
<main class="pt-28 md:pt-32 pb-16 md:pb-24">
<div id="product-container" class="min-h-[60vh] flex items-center justify-center font-noto-serif text-xl">Cargando pieza...</div>
</main>
<footer class="w-full rounded-none border-t-0 bg-[#fbf9f4] dark:bg-[#18241a] mt-auto">
<div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-12 px-4 sm:px-6 md:px-12 py-14 md:py-20 w-full max-w-[1920px] mx-auto">
<p class="font-manrope text-[10px] uppercase tracking-[0.15em] text-[#705a49]">© 2026 INTEMPORAL FINE JEWELRY. ELEGANCE AND INTEGRITY.</p>
</div>
</footer>

<script>
// Robot dinámico de producto
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

fetch('../data/catalogo.json')
  .then(res => res.json())
  .then(data => {
      const item = (data.items || []).find(i => i.id === id);
      const container = document.getElementById('product-container');
      
      if (!item) {
          container.innerHTML = '<p class="text-secondary text-2xl text-center">La pieza no ha sido encontrada en nuestro catálogo.</p>';
          return;
      }

      container.innerHTML = `
      <section class="max-w-[1920px] mx-auto px-4 sm:px-6 md:px-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-16 items-start">
          <div class="lg:col-span-7 grid grid-cols-12 gap-4">
            <div class="col-span-12 h-[56vh] md:h-[819px] bg-surface-container-low overflow-hidden">
              <img class="w-full h-full object-cover transition-all duration-700" alt="${item.nombre}" src="${item.imagen}"/>
            </div>
          </div>
          <div class="lg:col-span-5 lg:sticky lg:top-32 space-y-8 md:space-y-12">
            <header>
              <span class="font-manrope text-[10px] uppercase tracking-[0.25em] text-secondary mb-4 block">${item.coleccion}</span>
              <h1 class="font-noto-serif text-3xl sm:text-4xl lg:text-5xl leading-tight text-primary">${item.nombre}</h1>
              <p class="mt-5 md:mt-8 font-manrope text-lg md:text-xl tracking-wide text-primary">${item.precio}</p>
            </header>
            <div class="space-y-8">
              <div class="flex items-start gap-4 pb-6 border-b border-outline-variant/30">
                <span class="material-symbols-outlined text-primary mt-1" data-icon="diamond">diamond</span>
                <div>
                  <h3 class="font-manrope text-xs uppercase tracking-widest text-secondary mb-1">Corte / Estilo</h3>
                  <p class="font-manrope text-sm font-semibold">${item.corte}</p>
                </div>
              </div>
              <div class="flex items-start gap-4 pb-6 border-b border-outline-variant/30">
                <span class="material-symbols-outlined text-primary mt-1" data-icon="verified">verified</span>
                <div>
                  <h3 class="font-manrope text-xs uppercase tracking-widest text-secondary mb-1">Material Base</h3>
                  <p class="font-manrope text-sm font-semibold">${item.material || 'Oro 18K / Platino'}</p>
                </div>
              </div>
              <div class="bg-surface-container-low p-8 relative overflow-hidden">
                <span class="absolute top-[-20px] right-[-10px] text-[120px] opacity-5 font-noto-serif italic select-none text-primary">Nota</span>
                <h3 class="font-manrope text-xs uppercase tracking-widest text-secondary mb-4">Nota del Gemólogo</h3>
                <p class="font-noto-serif italic text-lg leading-relaxed text-primary relative z-10">${item.nota}</p>
              </div>
            </div>
            <button class="w-full bg-primary text-white py-4 md:py-6 font-manrope text-xs md:text-sm uppercase tracking-[0.16em] md:tracking-[0.2em] hover:bg-primary-container transition-colors duration-300">
                Reservar Consulta
            </button>
            <a href="catalogo.html" class="block w-full text-center border-b border-primary text-primary py-2 mt-4 text-xs tracking-widest uppercase">Volver al Catálogo</a>
          </div>
        </div>
      </section>
      `;
  }).catch(err => {
      document.getElementById('product-container').innerHTML = 'Error conectando con la base de datos.';
  });
</script>
</body></html>
