<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<link rel="icon" type="image/x-icon" href="../img/logo.jpg"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Joyería Josefina | Catálogo Dinámico</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../assets/js/tailwind-config.js"></script>
<link href="../assets/css/base.css" rel="stylesheet"/>
<link href="../assets/css/catalogo.css" rel="stylesheet"/>
</head>
<body class="bg-surface text-on-surface antialiased">
<header class="fixed top-0 w-full z-50 rounded-none bg-[#fbf9f4]/70 backdrop-blur-xl dark:bg-[#13383a]/80 shadow-none">
<nav class="flex flex-col md:flex-row justify-between md:items-center w-full px-4 sm:px-6 md:px-12 py-4 md:py-6 max-w-[1920px] mx-auto gap-3 md:gap-0">
<div class="flex items-center justify-between w-full md:w-auto gap-8">
<a href="index.html" class="flex items-center"><img src="../img/logo.jpg" alt="Joyería Josefina" class="h-8 sm:h-10 rounded-sm" /></a>
<div class="hidden md:flex items-center gap-8 font-manrope text-lg tracking-tight">
<a class="text-[#705a49] dark:text-[#705a49] opacity-70 hover:opacity-100 hover:text-[#13383a] transition-all duration-300" href="index.html">Inicio</a>
<a class="text-[#13383a] dark:text-[#fbf9f4] border-b border-[#13383a] pb-1" href="catalogo.html">Catálogo</a>

<a class="text-[#705a49] dark:text-[#705a49] opacity-70 hover:opacity-100 hover:text-[#13383a] transition-all duration-300" href="filosofia.html">Nuestra Filosofía</a>
</div>
</div>
</nav>
</header>
<main class="pt-28 md:pt-32 pb-16 md:pb-20">
<section class="px-4 sm:px-6 md:px-12 mb-14 md:mb-24 max-w-[1920px] mx-auto">
<div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-end">
<div class="md:col-span-7">
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-secondary mb-4 block">Alta Joyería Clásica</span>
<h1 class="text-4xl sm:text-5xl md:text-8xl leading-[1.1] text-primary">Catálogo <br/><span class="italic">Selecto</span></h1>
</div>
<div class="md:col-span-5 pb-4">
<p class="font-body text-base md:text-lg text-on-surface-variant max-w-md leading-relaxed">
Una curaduría de metales nobles y gemas atemporales, seleccionadas por su pureza y capacidad de trascender generaciones.
</p>
</div>
</div>
</section>

<!-- CONTENEDOR DINAMICO PARA JAVASCRIPT -->
<div id="dynamic-catalog"></div>

<section class="mt-20 md:mt-32 px-4 sm:px-6 md:px-12 max-w-[1920px] mx-auto">
<div class="bg-[#f0eee9] py-16 md:py-32 px-6 md:px-24 text-center relative overflow-hidden">
<div class="relative z-10">
<span class="font-label text-[10px] uppercase tracking-[0.4em] text-secondary mb-6 block">Atención Personalizada</span>
<h2 class="text-3xl sm:text-4xl md:text-7xl mb-8 md:mb-10 max-w-4xl mx-auto leading-tight">Forjamos el brillante legado de tus <span class="italic">recuerdos</span>.</h2>

</div>
</div>
</section>
</main>
<footer class="w-full rounded-none border-t-0 bg-[#fbf9f4] dark:bg-[#13383a] mt-auto">
<div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-12 px-4 sm:px-6 md:px-12 py-14 md:py-20 w-full max-w-[1920px] mx-auto">
<p class="font-manrope text-[10px] uppercase tracking-[0.15em] text-[#705a49]">© 2026 JOYERÍA JOSEFINA.</p>
</div>
</footer>

<script>
// Motor de renderizado dinámico — lista joyas via GitHub API
fetch('../data/index.json')
  .then(r => r.json())
  .then(ids => Promise.all(ids.map(id => fetch('../data/joyas/' + id + '.json').then(r => r.json()).then(item => ({ ...item, _id: id })))))
  .then(items => {
      const container = document.getElementById('dynamic-catalog');
      
      // Agrupar por colecciones
      const collections = {};
      items.forEach(item => {
          if (!collections[item.coleccion]) collections[item.coleccion] = [];
          collections[item.coleccion].push(item);
      });

      let html = '<section class="px-4 sm:px-6 md:px-12 max-w-[1920px] mx-auto">';
      
      for (const [colName, colItems] of Object.entries(collections)) {
          html += `
          <div class="mb-32">
            <div class="flex flex-col sm:flex-row sm:items-baseline gap-2 sm:gap-4 mb-10 md:mb-12">
              <h2 class="text-3xl md:text-4xl">${colName}</h2>
              <span class="font-body italic text-secondary text-lg">— Exclusividad Atemporal</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 md:gap-x-12 gap-y-14 md:gap-y-24">
          `;
          
          colItems.forEach(item => {
              const tagHtml = item.estado ? `<div class="absolute top-4 right-4 bg-surface/70 backdrop-blur-md px-3 py-1 font-label text-[10px] uppercase tracking-widest">${item.estado}</div>` : '';
              html += `
              <div>
                <div class="aspect-[4/5] bg-surface-container-low mb-8 relative">
                  <img class="w-full h-full object-cover" alt="${item.nombre}" src="${item.imagen}"/>
                  ${tagHtml}
                </div>
                <div class="px-2">
                  <h3 class="text-2xl mb-3">${item.nombre}</h3>
                  <div class="flex items-baseline justify-between gap-4 mb-4">
                    <span class="font-label text-lg font-bold text-primary">MXN $${Number(item.precio).toLocaleString('es-MX')}</span>
                  </div>
                  <div class="space-y-4 mb-8">
                    <div><span class="font-label text-[10px] uppercase tracking-widest text-outline block">Corte / Estilo</span><p class="font-body text-sm">${item.corte || 'Clásico'}</p></div>
                    <div class="bg-surface-container p-6">
                      <span class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2">Nota</span>
                      <p class="font-body text-sm italic leading-relaxed">"${item.nota || ''}"</p>
                    </div>
                  </div>
                  <a class="inline-flex w-full items-center justify-center py-4 bg-primary text-on-primary font-label text-xs uppercase tracking-[0.2em] hover:bg-primary-container transition-all" href="producto.html?id=${item._id}">Ver Detalles</a>
                </div>
              </div>`;
          });
          
          html += `</div></div>`;
      }
      html += '</section>';
      container.innerHTML = html;
  }).catch(err => console.error('Error cargando joyas:', err));
</script>
</body></html>
