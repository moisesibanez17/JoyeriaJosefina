<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Intemporal</title>
  <!-- Incluir el script de identidad de Netlify para permitir autenticación sin backend -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Personalización UI de Decap CMS */
    [class*="AppHeader"] {
      background-color: #13383a !important; /* Verde oscuro Josefina */
    }
    button[class*="Button-button-default-primary"], 
    a[class*="Button-button-default-primary"],
    [class*="Card"] [class*="Button-button-default-primary"] {
      background-color: #705a49 !important; /* Tono cálido / dorado */
      color: #fbf9f4 !important;
    }
    div[class*="SidebarContainer"] {
      background-color: #fbf9f4 !important; /* Crema */
    }
    [class*="StyledSidebarHeading"] {
      color: #13383a !important;
    }
    a[class*="SidebarNavLink"] {
      color: #705a49 !important;
    }
    a[class*="SidebarNavLinkActive"] {
      background-color: #13383a !important;
      color: white !important;
      border-left-color: #705a49 !important;
    }
  </style>
</head>
<body>
  <!-- Carga oficial de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>

  <!-- Componente React para Vista Previa en Vivo -->
  <script>
    var JoyasPreview = function(props) {
      var entry = props.entry;
      var getAsset = props.getAsset;

      var data = entry.getIn(['data']);
      if (!data) return h('div', {}, "Cargando previsualización...");

      data = data.toJS();
      var items = data.items || [];

      if (items.length === 0) {
        return h('div', { style: { padding: '2rem', fontFamily: 'system-ui, sans-serif', color: '#6b7280' } },
          h('p', {}, "Agrega joyas al inventario para ver la vista previa.")
        );
      }

      return h('div', { style: { padding: '2rem', fontFamily: 'system-ui, -apple-system, sans-serif', background: '#fbf9f4', minHeight: '100vh' } },
        h('h2', { style: { fontSize: '20px', marginBottom: '24px', color: '#13383a', borderBottom: '2px solid #705a49', paddingBottom: '8px' } }, "Vista Previa del Catálogo"),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: '20px' } },
          items.map(function(item, index) {
            var imgSrc = item.imagen ? getAsset(item.imagen).toString() : '';
            return h('div', { key: index, style: { border: '1px solid #e5e7eb', backgroundColor: '#fff', borderRadius: '10px', overflow: 'hidden', boxShadow: '0 2px 8px rgba(0,0,0,0.08)' } },
              imgSrc
                ? h('img', { src: imgSrc, style: { width: '100%', height: '260px', objectFit: 'cover', display: 'block' } })
                : h('div', { style: { width: '100%', height: '260px', background: '#f0eee9', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#9ca3af', fontSize: '14px' } }, "Sin imagen"),
              h('div', { style: { padding: '14px' } },
                item.estado
                  ? h('span', { style: { fontSize: '10px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '1px', color: '#fff', background: '#705a49', borderRadius: '4px', padding: '2px 8px', display: 'inline-block', marginBottom: '8px' } }, item.estado)
                  : null,
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' } },
                  h('h3', { style: { margin: '0', fontSize: '16px', color: '#13383a', lineHeight: '1.2', flex: '1' } }, item.nombre || 'Sin nombre'),
                  h('span', { style: { fontSize: '14px', fontWeight: '700', color: '#705a49', whiteSpace: 'nowrap', marginLeft: '8px' } }, item.precio || '')
                ),
                h('p', { style: { margin: '0 0 10px', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', color: '#9ca3af' } }, item.coleccion || ''),
                h('div', { style: { background: '#f7f5f1', padding: '10px', borderRadius: '6px', fontSize: '12px', color: '#4b5563' } },
                  item.corte ? h('p', { style: { margin: '0 0 4px', fontWeight: '600', color: '#13383a' } }, "Corte: " + item.corte) : null,
                  item.material ? h('p', { style: { margin: '0 0 4px' } }, "Material: " + item.material) : null,
                  item.nota ? h('p', { style: { margin: '4px 0 0', fontStyle: 'italic', color: '#6b7280' } }, "\u201C" + item.nota + "\u201D") : null
                )
              )
            );
          })
        )
      );
    };

    CMS.registerPreviewTemplate("catalogo_global", JoyasPreview);
  </script>
</body>
</html>
