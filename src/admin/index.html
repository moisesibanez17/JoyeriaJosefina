<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Intemporal</title>
  <!-- Incluir el script de identidad de Netlify para permitir autenticación sin backend -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Personalización UI de Decap CMS */
    [class*="AppHeader"] {
      background-color: #13383a !important; /* Verde oscuro Josefina */
    }
    button[class*="Button-button-default-primary"], 
    a[class*="Button-button-default-primary"],
    [class*="Card"] [class*="Button-button-default-primary"] {
      background-color: #705a49 !important; /* Tono cálido / dorado */
      color: #fbf9f4 !important;
    }
    div[class*="SidebarContainer"] {
      background-color: #fbf9f4 !important; /* Crema */
    }
    [class*="StyledSidebarHeading"] {
      color: #13383a !important;
    }
    a[class*="SidebarNavLink"] {
      color: #705a49 !important;
    }
    a[class*="SidebarNavLinkActive"] {
      background-color: #13383a !important;
      color: white !important;
      border-left-color: #705a49 !important;
    }
  </style>
</head>
<body>
  <!-- Carga oficial de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>

  <!-- Componente React para Vista Previa en Vivo -->
  <script>
    var JoyasPreview = function(props) {
      var entry = props.entry;
      var getAsset = props.getAsset;

      var data = entry.getIn(['data']);
      if (!data) return h('div', {}, "Cargando...");

      var item = data.toJS();
      var imgSrc = item.imagen ? getAsset(item.imagen).toString() : '';

      return h('div', { style: { fontFamily: "'Georgia', serif", background: '#fbf9f4', minHeight: '100vh', color: '#13383a' } },
        // Imagen hero
        h('div', { style: { position: 'relative', width: '100%', paddingTop: '125%', background: '#f0eee9', overflow: 'hidden' } },
          imgSrc
            ? h('img', { src: imgSrc, style: { position: 'absolute', inset: '0', width: '100%', height: '100%', objectFit: 'cover' } })
            : h('div', { style: { position: 'absolute', inset: '0', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#9ca3af', fontSize: '14px', letterSpacing: '2px', textTransform: 'uppercase' } }, "Sin fotografía"),
          item.estado
            ? h('div', { style: { position: 'absolute', top: '16px', right: '16px', background: 'rgba(251,249,244,0.85)', backdropFilter: 'blur(8px)', padding: '4px 12px', fontSize: '10px', letterSpacing: '2px', textTransform: 'uppercase', color: '#705a49', fontFamily: 'system-ui' } }, item.estado)
            : null
        ),
        // Info
        h('div', { style: { padding: '28px 24px' } },
          h('p', { style: { margin: '0 0 8px', fontSize: '10px', letterSpacing: '3px', textTransform: 'uppercase', color: '#705a49', fontFamily: 'system-ui' } }, item.coleccion || ''),
          h('h1', { style: { margin: '0 0 6px', fontSize: '28px', fontWeight: '400', lineHeight: '1.15', color: '#13383a' } }, item.nombre || 'Sin nombre'),
          h('p', { style: { margin: '0 0 24px', fontSize: '20px', fontWeight: '700', color: '#705a49', fontFamily: 'system-ui' } }, item.precio || ''),
          h('hr', { style: { border: 'none', borderTop: '1px solid #e5e0d8', margin: '0 0 20px' } }),
          item.corte ? h('div', { style: { marginBottom: '12px' } },
            h('span', { style: { display: 'block', fontSize: '9px', letterSpacing: '3px', textTransform: 'uppercase', color: '#9ca3af', fontFamily: 'system-ui', marginBottom: '4px' } }, "Corte / Estilo"),
            h('p', { style: { margin: '0', fontSize: '14px', fontFamily: 'system-ui' } }, item.corte)
          ) : null,
          item.material ? h('div', { style: { marginBottom: '20px' } },
            h('span', { style: { display: 'block', fontSize: '9px', letterSpacing: '3px', textTransform: 'uppercase', color: '#9ca3af', fontFamily: 'system-ui', marginBottom: '4px' } }, "Material / Quilates"),
            h('p', { style: { margin: '0', fontSize: '14px', fontFamily: 'system-ui' } }, item.material)
          ) : null,
          item.nota ? h('div', { style: { background: '#f0eee9', padding: '16px 20px', marginTop: '8px' } },
            h('span', { style: { display: 'block', fontSize: '9px', letterSpacing: '3px', textTransform: 'uppercase', color: '#9ca3af', fontFamily: 'system-ui', marginBottom: '8px' } }, "Nota Gemológica"),
            h('p', { style: { margin: '0', fontSize: '14px', fontStyle: 'italic', lineHeight: '1.6', color: '#4b5563' } }, '\u201C' + item.nota + '\u201D')
          ) : null
        )
      );
    };

    CMS.registerPreviewTemplate("catalogo_global", JoyasPreview);
  </script>
</body>
</html>
