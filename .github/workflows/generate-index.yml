name: Generate Catalog Index

on:
  push:
    paths:
      - 'src/data/joyas/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          python3 -c "
          import json, os, glob

          files = sorted(glob.glob('src/data/joyas/*.json'))
          ids = [os.path.splitext(os.path.basename(f))[0] for f in files]

          with open('src/data/index.json', 'w') as out:
              json.dump(ids, out, ensure_ascii=False)

          print('Generated index with', len(ids), 'entries:', ids)
          "

      - name: Commit index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/index.json
          git diff --cached --quiet || git commit -m "chore: update catalog index [skip ci]"
          git push
